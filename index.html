<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Urfa Nerede — Urfa Esnaf Atlası</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --earth: #8B4513;
  --earth-dark: #6B3410;
  --ink: #111;
  --ink-2: #555;
  --ink-3: #999;
  --line: #E8E8E8;
  --bg: #F5F4F0;
  --white: #fff;
  --yellow: #F5C518;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; font-family:'DM Sans',sans-serif; overflow:hidden; }

/* FULL MAP */
#map { position:fixed; inset:0; width:100%; height:100%; z-index:1; }

/* TOP BAR */
.topbar {
  position:fixed; top:0; left:0; right:0;
  z-index:100; padding:10px 12px 8px;
  display:flex; flex-direction:column; gap:8px;
  pointer-events:none;
}
.topbar-row1 { display:flex; align-items:center; gap:8px; pointer-events:all; }

.logo-pill {
  display:flex; align-items:center; gap:8px;
  background:var(--white); border-radius:12px;
  padding:7px 12px 7px 8px;
  box-shadow:0 2px 12px rgba(0,0,0,0.15);
  flex-shrink:0;
}
.logo-icon { width:28px; height:28px; background:var(--earth); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; }
.logo-name { font-family:'DM Serif Display',serif; font-size:14px; color:var(--ink); line-height:1.2; }
.logo-sub { font-size:10px; color:var(--ink-3); }

.search-pill {
  flex:1; display:flex; align-items:center;
  background:var(--white); border-radius:12px;
  padding:0 12px; height:42px;
  box-shadow:0 2px 12px rgba(0,0,0,0.15); gap:8px;
}
.search-pill input { flex:1; border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); background:transparent; }
.search-pill input::placeholder { color:var(--ink-3); }

.stat-pill {
  background:var(--earth); border-radius:12px;
  padding:7px 12px; box-shadow:0 2px 12px rgba(0,0,0,0.2);
  text-align:center; flex-shrink:0;
}
.stat-pill-num { font-size:16px; font-weight:700; color:white; line-height:1; }
.stat-pill-lbl { font-size:9px; color:rgba(255,255,255,0.75); }

.filter-row {
  display:flex; gap:6px; overflow-x:auto;
  padding-bottom:2px; pointer-events:all;
  scrollbar-width:none;
}
.filter-row::-webkit-scrollbar { display:none; }

.chip {
  height:30px; padding:0 12px; border-radius:20px; border:none;
  background:var(--white); font-family:'DM Sans',sans-serif;
  font-size:12px; font-weight:600; color:var(--ink-2);
  cursor:pointer; white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
  transition:all 0.15s; flex-shrink:0;
}
.chip.active { background:var(--earth); color:white; }

/* LIST BOTTOM SHEET */
.list-sheet {
  position:fixed; bottom:0; left:0; right:0;
  z-index:200; background:var(--white);
  border-radius:18px 18px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,0.10);
  height:62px;
  transition:height 0.3s cubic-bezier(0.32,0.72,0,1);
  display:flex; flex-direction:column; overflow:hidden;
}
.list-sheet.expanded { height:58vh; }

.sheet-pull {
  padding:8px 16px 6px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--line); flex-shrink:0;
}
.pull-handle { width:36px; height:4px; background:var(--line); border-radius:2px; margin:0 auto 6px; }
.sheet-pull-label { font-size:13px; font-weight:700; color:var(--ink); }
.sheet-pull-count { font-size:12px; color:var(--ink-3); }
.sheet-arrow { font-size:16px; color:#bbb; transition:transform 0.3s; }
.list-sheet.expanded .sheet-arrow { transform:rotate(180deg); }

.list-items { overflow-y:auto; flex:1; }

.list-item {
  padding:12px 16px; border-bottom:1px solid var(--line);
  cursor:pointer; display:flex; gap:10px; align-items:flex-start;
}
.list-item:active { background:var(--bg); }
.item-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
.item-name { font-size:13px; font-weight:700; color:var(--ink); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-meta { display:flex; gap:5px; align-items:center; font-size:11px; color:var(--ink-3); flex-wrap:wrap; }
.item-cat { font-weight:700; font-size:10px; padding:1px 7px; border-radius:3px; }
.item-rating { font-weight:700; color:var(--ink-2); }
.type-badge { font-size:10px; color:var(--ink-3); background:var(--bg); padding:1px 6px; border-radius:3px; }

/* ADD FAB */
.add-fab {
  position:fixed; bottom:76px; right:16px; z-index:200;
  width:48px; height:48px; background:var(--earth);
  border:none; border-radius:14px; color:white; font-size:26px;
  cursor:pointer; box-shadow:0 4px 16px rgba(139,69,19,0.4);
  display:flex; align-items:center; justify-content:center;
}

/* OVERLAY */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.4);
  z-index:400; display:none; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(2px);
}
.overlay.show { display:flex; }

/* BOTTOM MODAL */
.bmodal {
  background:var(--white); border-radius:18px 18px 0 0;
  width:100%; max-width:560px; max-height:88vh;
  overflow-y:auto; box-shadow:0 -8px 32px rgba(0,0,0,0.15);
  animation:slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform:translateY(40px); opacity:0; }
  to { transform:translateY(0); opacity:1; }
}

.bm-handle-bar { width:36px; height:4px; background:var(--line); border-radius:2px; margin:10px auto 0; }

.bm-head {
  padding:12px 16px 10px;
  display:flex; align-items:flex-start; justify-content:space-between;
  border-bottom:1px solid var(--line);
  position:sticky; top:0; background:var(--white); z-index:1;
}
.bm-title { font-family:'DM Serif Display',serif; font-size:20px; color:var(--ink); }
.bm-close { width:28px; height:28px; background:var(--bg); border:none; border-radius:6px; font-size:12px; color:var(--ink-3); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.bm-body { padding:14px 16px; }
.bm-footer { padding:10px 16px 24px; display:flex; gap:8px; }

/* DETAIL */
.d-cat-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:3px; margin-bottom:6px; letter-spacing:0.5px; text-transform:uppercase; }
.d-name { font-family:'DM Serif Display',serif; font-size:20px; color:var(--ink); margin-bottom:3px; line-height:1.2; }
.d-addr { font-size:12px; color:var(--ink-3); line-height:1.5; margin-bottom:10px; }
.d-rating-row { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.d-stars { font-size:14px; }
.d-rating-lbl { font-size:11px; color:var(--ink-3); }

.detail-grid { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin-bottom:12px; }
.d-cell { padding:9px 12px; border-right:1px solid var(--line); border-bottom:1px solid var(--line); }
.d-cell:nth-child(even) { border-right:none; }
.d-cell:nth-last-child(-n+2) { border-bottom:none; }
.d-cell-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--ink-3); margin-bottom:2px; }
.d-cell-val { font-size:12px; font-weight:600; color:var(--ink); }

.rev-heading { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--ink-3); margin-bottom:8px; }
.rev-row { padding:7px 10px; background:var(--bg); border-radius:5px; margin-bottom:6px; font-size:12px; color:var(--ink-2); line-height:1.5; }
.rev-author { font-size:11px; font-weight:700; color:var(--ink); margin-bottom:2px; }
.no-rev { font-size:12px; color:var(--ink-3); font-style:italic; }
.btn-rev { width:100%; height:40px; background:transparent; border:1px solid var(--line); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:var(--ink-2); cursor:pointer; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:5px; }
.btn-delete { width:100%; height:40px; background:transparent; border:1px solid #ffcccc; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:#cc2200; cursor:pointer; margin-top:4px; display:flex; align-items:center; justify-content:center; gap:5px; }
.btn-delete:hover { background:#fff0ee; }

/* FORM */
.type-toggle { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.t-opt { padding:11px; border:1.5px solid var(--line); border-radius:8px; cursor:pointer; transition:all 0.12s; }
.t-opt.active { border-color:var(--earth); background:#FDF0E8; }
.t-opt-icon { font-size:16px; margin-bottom:4px; }
.t-opt-title { font-size:12px; font-weight:700; color:var(--ink); margin-bottom:1px; }
.t-opt-desc { font-size:10px; color:var(--ink-3); }

.fg { margin-bottom:12px; }
.fg label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-3); margin-bottom:5px; }
.fg input, .fg select, .fg textarea { width:100%; height:42px; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:0 12px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); outline:none; transition:border-color 0.12s; appearance:none; }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--earth); background:var(--white); }
.fg textarea { height:auto; padding:10px 12px; resize:vertical; min-height:80px; }
.fg select option { background:white; }
.fg-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.fg-hint { font-size:11px; color:var(--ink-3); margin-top:4px; }
.csv-drop { display:block; border:1.5px dashed var(--line); border-radius:8px; padding:14px; text-align:center; cursor:pointer; margin-bottom:2px; }
.csv-drop-txt { font-size:12px; color:var(--ink-3); line-height:1.6; }
#csv-input { display:none; }

.btn-cancel { height:42px; padding:0 16px; background:transparent; border:1px solid var(--line); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--ink-2); cursor:pointer; }
.btn-save { flex:1; height:42px; background:var(--earth); border:none; border-radius:8px; color:white; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }

.star-pick { display:flex; gap:8px; margin-top:4px; }
.sp { font-size:28px; cursor:pointer; color:var(--line); transition:color 0.1s; line-height:1; }
.sp.on { color:var(--yellow); }

/* POPUP */
.leaflet-popup-content-wrapper { background:var(--white); border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.15); border:1px solid var(--line); padding:0; }
.leaflet-popup-content { margin:0; }
.leaflet-popup-tip-container { display:none; }
.p-inner { padding:10px 14px; min-width:150px; }
.p-name { font-size:13px; font-weight:700; color:var(--ink); margin-bottom:4px; }
.p-meta { font-size:11px; color:var(--ink-3); display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.p-dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
.p-btn { display:block; width:100%; padding:6px; background:var(--earth); color:white; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; text-align:center; font-family:'DM Sans',sans-serif; }
</style>
</head>
<body>

<div id="map"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row1">
    <div class="logo-pill">
      <div class="logo-icon">🌶</div>
      <div>
        <div class="logo-name">Urfa Nerede</div>
        <div class="logo-sub">Esnaf Atlası</div>
      </div>
    </div>
    <div class="search-pill">
      <span style="font-size:13px;color:#aaa;">🔍</span>
      <input type="text" id="search-input" placeholder="İşletme veya şehir ara…">
    </div>
    <div class="stat-pill">
      <div class="stat-pill-num" id="total-count">0</div>
      <div class="stat-pill-lbl">esnaf</div>
    </div>
  </div>
  <div class="filter-row" id="filters">
    <button class="chip active" data-cat="Tümü">Tümü</button>
    <button class="chip" data-cat="__DUNYA__">🌍 Dünya</button>
    <button class="chip" data-cat="Kebapçı">🥙 Kebapçı</button>
    <button class="chip" data-cat="Lahmacuncu">🫓 Lahmacun</button>
    <button class="chip" data-cat="Fırın">🍞 Fırın</button>
    <button class="chip" data-cat="Kasap">🥩 Kasap</button>
    <button class="chip" data-cat="Bakkal">🏪 Bakkal</button>
    <button class="chip" data-cat="Kahvehane">☕ Kahvehane</button>
    <button class="chip" data-cat="Lokanta">🍽️ Lokanta</button>
    <button class="chip" data-cat="Diğer">📦 Diğer</button>
  </div>
</div>

<!-- LIST SHEET (swipe up) -->
<div class="list-sheet" id="list-sheet">
  <div class="sheet-pull" onclick="toggleList()">
    <div>
      <div class="pull-handle"></div>
      <span class="sheet-pull-label">İşletmeler</span>
      <span class="sheet-pull-count" id="list-count"> · 0 sonuç</span>
    </div>
    <span class="sheet-arrow" id="sheet-arrow">▲</span>
  </div>
  <div class="list-items" id="esnaf-list"></div>
</div>

<!-- ADD FAB -->
<button class="add-fab" onclick="openAdd()">+</button>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay" onclick="closeDetail()">
  <div class="bmodal" onclick="event.stopPropagation()">
    <div class="bm-handle-bar"></div>
    <div class="bm-head">
      <div>
        <div class="d-cat-badge" id="d-cat"></div>
        <div class="d-name" id="d-name"></div>
      </div>
      <button class="bm-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="bm-body">
      <div class="d-addr" id="d-addr"></div>
      <div class="d-rating-row">
        <div class="d-stars" id="d-stars"></div>
        <div class="d-rating-lbl" id="d-rlbl"></div>
      </div>
      <div class="detail-grid">
        <div class="d-cell"><div class="d-cell-lbl">Şehir</div><div class="d-cell-val" id="d-city">—</div></div>
        <div class="d-cell"><div class="d-cell-lbl">İlçe</div><div class="d-cell-val" id="d-district">—</div></div>
        <div class="d-cell"><div class="d-cell-lbl">Tür</div><div class="d-cell-val" id="d-type">—</div></div>
        <div class="d-cell"><div class="d-cell-lbl">Tel</div><div class="d-cell-val" id="d-phone">—</div></div>
      </div>
      <div class="rev-heading">Yorumlar</div>
      <div id="d-revs"></div>
      <button class="btn-rev" onclick="openRev()">★ &nbsp;Yorum & Puan Ekle</button>
      <button class="btn-delete" id="btn-delete" onclick="confirmDelete()" style="display:none">🗑 Mekanı Sil</button>
    </div>
  </div>
</div>

<!-- DELETE PASSWORD MODAL -->
<div class="overlay" id="delete-modal" onclick="closeDelete()">
  <div class="bmodal" onclick="event.stopPropagation()" style="max-height:260px">
    <div class="bm-handle-bar"></div>
    <div class="bm-head">
      <div style="font-weight:700;font-size:1rem">🗑 Mekanı Sil</div>
      <button class="bm-close" onclick="closeDelete()">✕</button>
    </div>
    <div class="bm-body" style="padding:1rem">
      <div style="margin-bottom:0.75rem;color:var(--text2);font-size:0.9rem">Bu mekanı silmek için şifreyi girin:</div>
      <input type="password" id="del-pass" placeholder="Şifre" style="width:100%;padding:0.6rem 0.8rem;border:1px solid var(--line);border-radius:8px;font-size:1rem;box-sizing:border-box;margin-bottom:0.75rem" onkeydown="if(event.key==='Enter')doDelete()">
      <div id="del-err" style="color:#e53;font-size:0.82rem;margin-bottom:0.5rem;display:none">❌ Yanlış şifre!</div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn-cancel" style="flex:1" onclick="closeDelete()">İptal</button>
        <button class="btn-save" style="flex:1;background:#e53" onclick="doDelete()">Sil</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="add-modal">
  <div class="bmodal">
    <div class="bm-handle-bar"></div>
    <div class="bm-head">
      <div class="bm-title">Yeni Esnaf Ekle</div>
      <button class="bm-close" onclick="closeAdd()">✕</button>
    </div>
    <div class="bm-body">
      <div class="fg"><label>İşletme Türü</label></div>
      <div class="type-toggle">
        <div class="t-opt active" onclick="setType('urfa_is',this)">
          <div class="t-opt-icon">🌶</div>
          <div class="t-opt-title">Urfa İşyeri</div>
          <div class="t-opt-desc">Urfa kebabı vb.</div>
        </div>
        <div class="t-opt" onclick="setType('urfa_sahip',this)">
          <div class="t-opt-icon">👤</div>
          <div class="t-opt-title">Urfalı Sahibi</div>
          <div class="t-opt-desc">Sahibi Urfalı</div>
        </div>
      </div>
      <div class="fg"><label>İşyeri Adı *</label><input type="text" id="f-name" placeholder="Örn: Urfa Sofrası"></div>
      <div class="fg-row">
        <div class="fg"><label>Kategori *</label>
          <select id="f-cat">
            <option value="">Seçin…</option>
            <option>Kebapçı</option><option>Lahmacuncu</option><option>Fırın</option>
            <option>Kasap</option><option>Bakkal</option><option>Kahvehane</option>
            <option>Lokanta</option><option>Diğer</option>
          </select>
        </div>
        <div class="fg"><label>Telefon</label><input type="text" id="f-phone" placeholder="05xx…"></div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>Şehir *</label><input type="text" id="f-city" placeholder="İstanbul"></div>
        <div class="fg"><label>İlçe</label><input type="text" id="f-district" placeholder="Kadıköy"></div>
      </div>
      <div class="fg"><label>Adres</label><input type="text" id="f-address" placeholder="Mahalle, cadde…"></div>
      <div class="fg-row">
        <div class="fg"><label>Enlem</label><input type="number" id="f-lat" placeholder="41.0082" step="any"></div>
        <div class="fg"><label>Boylam</label><input type="number" id="f-lng" placeholder="28.9784" step="any"></div>
      </div>
      <div class="fg-hint" style="margin-bottom:14px;">💡 Haritaya uzun basın → koordinat dolar</div>
      <label class="csv-drop" for="csv-input">
        <div style="font-size:20px;margin-bottom:5px;">📁</div>
        <div class="csv-drop-txt"><strong>CSV yükle</strong> ile toplu ekleme</div>
      </label>
      <input type="file" id="csv-input" accept=".csv" onchange="importCSV(event)">
    </div>
    <div class="bm-footer">
      <button class="btn-cancel" onclick="closeAdd()">İptal</button>
      <button class="btn-save" onclick="saveEsnaf()">Kaydet</button>
    </div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="overlay" id="rev-modal">
  <div class="bmodal">
    <div class="bm-handle-bar"></div>
    <div class="bm-head">
      <div class="bm-title">Yorum Ekle</div>
      <button class="bm-close" onclick="closeRev()">✕</button>
    </div>
    <div class="bm-body">
      <div class="fg"><label>Adınız</label><input type="text" id="r-name" placeholder="İsim girin…"></div>
      <div class="fg">
        <label>Puanınız</label>
        <div class="star-pick">
          <span class="sp" data-v="1" onclick="setStar(1)">★</span>
          <span class="sp" data-v="2" onclick="setStar(2)">★</span>
          <span class="sp" data-v="3" onclick="setStar(3)">★</span>
          <span class="sp" data-v="4" onclick="setStar(4)">★</span>
          <span class="sp" data-v="5" onclick="setStar(5)">★</span>
        </div>
      </div>
      <div class="fg"><label>Yorumunuz</label><textarea id="r-text" placeholder="Deneyiminizi paylaşın…"></textarea></div>
    </div>
    <div class="bm-footer">
      <button class="btn-cancel" onclick="closeRev()">İptal</button>
      <button class="btn-save" onclick="saveReview()">Gönder</button>
    </div>
  </div>
</div>

<script>
const CAT_COLOR = {
  'Kebapçı':'#8B4513','Lahmacuncu':'#F07020','Fırın':'#E8A020',
  'Kasap':'#A0522D','Bakkal':'#1A9954','Kahvehane':'#6B4226',
  'Lokanta':'#1A6BF5','Diğer':'#888888'
};
const CAT_EMOJI = {
  'Kebapçı':'🥙','Lahmacuncu':'🫓','Fırın':'🍞','Kasap':'🥩',

let userEsnaflar = []; try { userEsnaflar = JSON.parse(localStorage.getItem('urfa_user')||'[]'); } catch(e){}
let savedReviews = {}; try { savedReviews = JSON.parse(localStorage.getItem('urfa_reviews')||'{}'); } catch(e){}

let esnaflar = BASE_DATA.map(e => ({
  ...e,
  reviews: savedReviews[e.id] || e.reviews
})).concat(userEsnaflar);

const baseIds = new Set(BASE_DATA.map(e=>e.id));

const map = L.map('map',{center:[39,35],zoom:6,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:19}).addTo(map);

function mkIcon(cat){
  const c=CAT_COLOR[cat]||'#888';
  return L.divIcon({
    className:'',
    html:`<div style="width:28px;height:28px;background:${c};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.2);"></div>`,
    iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-30]
  });
}

function addMarker(e){
  if(markers[e.id]) markers[e.id].remove();
  const m=L.marker([e.lat,e.lng],{icon:mkIcon(e.category)})
    .bindPopup(`<div class="p-inner"><div class="p-name">${e.name}</div><div class="p-meta"><span class="p-dot" style="background:${CAT_COLOR[e.category]||'#888'}"></span>${e.category} · ${e.city}</div><button class="p-btn" onclick="showDetail(${e.id})">Detay gör →</button></div>`,{closeButton:false,maxWidth:200})
    .addTo(map);
  m.on('click',()=>{ map.closePopup(); m.openPopup(); });
  markers[e.id]=m;
}

const TURKEY_CITIES = new Set(['Adana','Adıyaman','Afyonkarahisar','Ağrı','Aksaray','Amasya','Ankara','Antalya','Ardahan','Artvin','Aydın','Balıkesir','Bartın','Batman','Bayburt','Bilecik','Bingöl','Bitlis','Bolu','Burdur','Bursa','Çanakkale','Çankırı','Çorum','Denizli','Diyarbakır','Düzce','Edirne','Elazığ','Erzincan','Erzurum','Eskişehir','Gaziantep','Giresun','Gümüşhane','Hakkari','Hatay','Iğdır','Isparta','İstanbul','İzmir','Kahramanmaraş','Karabük','Karaman','Kars','Kastamonu','Kayseri','Kırıkkale','Kırklareli','Kırşehir','Kilis','Kocaeli','Konya','Kütahya','Malatya','Manisa','Mardin','Mersin','Muğla','Muş','Nevşehir','Niğde','Ordu','Osmaniye','Rize','Sakarya','Samsun','Siirt','Sinop','Sivas','Şanlıurfa','Şırnak','Tekirdağ','Tokat','Trabzon','Tunceli','Uşak','Van','Yalova','Yozgat','Zonguldak']);

function render(){
  const filtered=esnaflar.filter(e=>{
    const isDunya = !TURKEY_CITIES.has(e.city);
    if(fCat==='__DUNYA__') return isDunya && (!fQ || e.name.toLowerCase().includes(fQ.toLowerCase())||(e.city||'').toLowerCase().includes(fQ.toLowerCase()));
    const mc=fCat==='Tümü'||e.category===fCat;
    const q=fQ.toLowerCase();
    const ms=!q||e.name.toLowerCase().includes(q)||(e.city||'').toLowerCase().includes(q)||(e.district||'').toLowerCase().includes(q);
    return mc&&ms;
  });
  Object.values(markers).forEach(m=>m.remove()); markers={};
  filtered.forEach(e=>{ if(e.lat&&e.lng) addMarker(e); });
  const list=document.getElementById('esnaf-list');
  list.innerHTML=filtered.map(e=>{
    const avg=e.reviews.length?(e.reviews.reduce((a,r)=>a+r.star,0)/e.reviews.length).toFixed(1):null;
    const c=CAT_COLOR[e.category]||'#888';
    return `<div class="list-item" onclick="showDetail(${e.id})">
      <div class="item-dot" style="background:${c}"></div>
      <div style="flex:1;min-width:0;">
        <div class="item-name">${e.name}</div>
        <div class="item-meta">
          <span class="item-cat" style="background:${c}18;color:${c}">${e.category}</span>
          <span>📍 ${e.city}${e.district?', '+e.district:''}</span>
          ${avg?`<span class="item-rating">★ ${avg}</span>`:''}
          <span class="type-badge">${e.type==='urfa_is'?'🌶':'👤'} ${e.type==='urfa_is'?'İşyeri':'Sahibi'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('total-count').textContent=filtered.length;
  document.getElementById('list-count').textContent=' · '+filtered.length+' sonuç';
}

function toggleList(){
  listOpen=!listOpen;
  document.getElementById('list-sheet').classList.toggle('expanded',listOpen);
  document.getElementById('sheet-arrow').textContent=listOpen?'▼':'▲';
}

function showDetail(id){
  const e=esnaflar.find(x=>x.id===id); if(!e) return;
  selId=id; map.closePopup();
  const c=CAT_COLOR[e.category]||'#888';
  const catEl=document.getElementById('d-cat');
  catEl.textContent=`${CAT_EMOJI[e.category]||''} ${e.category}`;
  catEl.style.cssText=`background:${c}18;color:${c};`;
  document.getElementById('d-name').textContent=e.name;
  document.getElementById('d-addr').textContent=[e.address,e.district,e.city].filter(Boolean).join(', ');
  const avg=e.reviews.length?e.reviews.reduce((a,r)=>a+r.star,0)/e.reviews.length:0;
  const r=Math.round(avg);
  document.getElementById('d-stars').textContent='★'.repeat(r)+'☆'.repeat(5-r);
  document.getElementById('d-stars').style.color=avg>0?'#F5C518':'#ccc';
  document.getElementById('d-rlbl').textContent=e.reviews.length?`${avg.toFixed(1)} · ${e.reviews.length} yorum`:'Henüz puan yok';
  document.getElementById('d-city').textContent=e.city||'—';
  document.getElementById('d-district').textContent=e.district||'—';
  document.getElementById('d-type').textContent=e.type==='urfa_is'?'🌶 İşyeri':'👤 Sahip';
  document.getElementById('d-phone').textContent=e.phone||'—';
  const rev=document.getElementById('d-revs');
  rev.innerHTML=!e.reviews.length?'<div class="no-rev">Henüz yorum eklenmemiş.</div>':e.reviews.slice(-4).map(r=>`<div class="rev-row"><div class="rev-author">${r.author} ${'★'.repeat(r.star)}</div>${r.text}</div>`).join('');
  document.getElementById('detail-overlay').classList.add('show');
  if(e.lat&&e.lng) map.setView([e.lat,e.lng],14,{animate:true});
  // Kullanıcı eklediği mekanlar silinebilir (BASE_DATA dışındaki)
  const isUserAdded = !baseIds.has(e.id);
  document.getElementById('btn-delete').style.display = isUserAdded ? 'block' : 'block'; // her mekan silinebilir
}

function closeDetail(){ selId=null; document.getElementById('detail-overlay').classList.remove('show'); }

function confirmDelete(){
  document.getElementById('del-pass').value='';
  document.getElementById('del-err').style.display='none';
  document.getElementById('delete-modal').classList.add('show');
  setTimeout(()=>document.getElementById('del-pass').focus(),100);
}
function closeDelete(){ document.getElementById('delete-modal').classList.remove('show'); }
function doDelete(){
  const pass = document.getElementById('del-pass').value;
  const DELETE_PASS = 'urfa2025';
  if(pass !== DELETE_PASS){
    document.getElementById('del-err').style.display='block';
    document.getElementById('del-pass').value='';
    document.getElementById('del-pass').focus();
    return;
  }
  if(!selId) return;
  const idx = esnaflar.findIndex(x=>x.id===selId);
  if(idx>-1){
    esnaflar.splice(idx,1);
    delete reviews[selId];
    save(); render();
    closeDelete();
    closeDetail();
    alert('Mekan silindi.');
  }
}

function openAdd(){ document.getElementById('add-modal').classList.add('show'); }
function closeAdd(){
  document.getElementById('add-modal').classList.remove('show');
  ['f-name','f-cat','f-phone','f-city','f-district','f-address','f-lat','f-lng'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}
function setType(t,el){ esnafType=t; document.querySelectorAll('.t-opt').forEach(x=>x.classList.remove('active')); el.classList.add('active'); }

function saveEsnaf(){
  const name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value;
  const city=document.getElementById('f-city').value.trim();
  const lat=parseFloat(document.getElementById('f-lat').value);
  const lng=parseFloat(document.getElementById('f-lng').value);
  if(!name||!cat||!city){alert('Ad, Kategori ve Şehir zorunludur.');return;}
  const e={id:Date.now(),name,category:cat,city,district:document.getElementById('f-district').value.trim(),address:document.getElementById('f-address').value.trim(),phone:document.getElementById('f-phone').value.trim(),lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng,type:esnafType,reviews:[]};
  esnaflar.push(e); save(); closeAdd(); render();
  if(e.lat&&e.lng) showDetail(e.id);
}

function importCSV(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    let added=0;
    lines.forEach((line,i)=>{
      if(i===0) return;
      const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      if(cols.length<3) return;
      const [name,category,city,district,address,lat,lng,phone]=cols;
      if(!name||!city) return;
      esnaflar.push({id:Date.now()+i,name,category:category||'Diğer',city,district:district||'',address:address||'',phone:phone||'',lat:parseFloat(lat)||null,lng:parseFloat(lng)||null,type:'urfa_sahip',reviews:[]});
      added++;
    });
    save(); render(); alert(added+' esnaf içe aktarıldı.'); closeAdd();
  };
  reader.readAsText(file);
}

function openRev(){ document.getElementById('rev-modal').classList.add('show'); setStar(5); }
function closeRev(){ document.getElementById('rev-modal').classList.remove('show'); document.getElementById('r-name').value=''; document.getElementById('r-text').value=''; }
function setStar(n){ revStar=n; document.querySelectorAll('.sp').forEach(s=>s.classList.toggle('on',+s.dataset.v<=n)); }
function saveReview(){
  if(!selId) return;
  const author=document.getElementById('r-name').value.trim()||'Anonim';
  const text=document.getElementById('r-text').value.trim();
  if(!text){alert('Lütfen bir yorum yazın.');return;}
  const e=esnaflar.find(x=>x.id===selId);
  if(e){e.reviews.push({author,star:revStar,text});save();closeRev();showDetail(selId);}
}

document.getElementById('filters').addEventListener('click',ev=>{
  if(!ev.target.matches('.chip')) return;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  ev.target.classList.add('active');
  fCat=ev.target.dataset.cat;
  if(fCat==='__DUNYA__') map.setView([48,10],4,{animate:true});
  else if(fCat==='Tümü') map.setView([39,35],6,{animate:true});
  render();
});

document.getElementById('search-input').addEventListener('input',ev=>{ fQ=ev.target.value; render(); });

map.on('contextmenu',function(ev){
  document.getElementById('f-lat').value=ev.latlng.lat.toFixed(6);
  document.getElementById('f-lng').value=ev.latlng.lng.toFixed(6);
  openAdd();
});

function save(){
  try{
    localStorage.setItem('urfa_user',JSON.stringify(esnaflar.filter(e=>!baseIds.has(e.id))));
    const reviews={};
    esnaflar.filter(e=>baseIds.has(e.id)&&e.reviews.length).forEach(e=>{reviews[e.id]=e.reviews;});
    localStorage.setItem('urfa_reviews',JSON.stringify(reviews));
  }catch(e){}
}

render();
</script>
</body>
